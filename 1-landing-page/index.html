  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }
    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem 2rem;
      position: relative;
      max-width: 640px;
      width: 100%;
    }
    .wrap::before {
      content: '';
      position: fixed;
      top: -60px; left: -60px;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: rgba(0,180,216,0.07);
      pointer-events: none;
    }
    .wrap::after {
      content: '';
      position: fixed;
      bottom: -60px; right: -60px;
      width: 260px; height: 260px;
      border-radius: 50%;
      background: rgba(220,38,38,0.07);
      pointer-events: none;
    }
    .logo { margin-bottom: 2rem; }
    .logo img { height: 64px; width: auto; }
    .badge {
      display: inline-block;
      background: rgba(0,180,216,0.12);
      color: #00b4d8;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid rgba(0,180,216,0.3);
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: clamp(24px, 5vw, 36px);
      font-weight: 900;
      color: #ffffff;
      line-height: 1.15;
      margin-bottom: 0.5rem;
    }
    h1 .red { color: #ef4444; }
    h1 .cyan { color: #00b4d8; }
    .divider {
      width: 40px; height: 2px;
      background: #00b4d8;
      margin: 1.5rem auto;
    }
    p {
      font-size: 15px;
      color: #8b9ab0;
      max-width: 380px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .notify {
      display: flex;
      max-width: 400px;
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .notify input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: none;
      outline: none;
      padding: 13px 16px;
      font-size: 14px;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
    }
    .notify input::placeholder { color: #4a5568; }
    .notify button {
      background: #00b4d8;
      color: #0f1117;
      border: none;
      padding: 13px 20px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .notify button:hover { background: #0096b4; }
    .footer {
      margin-top: 2.5rem;
      font-size: 12px;
      color: #4a5568;
    }
  </style>
</head>
